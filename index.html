<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criattiva3D – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #1a1e29;
  --bg4: #21273a;
  --border: #2a3045;
  --text: #e8ecf4;
  --muted: #6b7592;
  --accent: #00e5a0;
  --accent2: #3d7fff;
  --danger: #ff3d5a;
  --font-mono: 'Space Mono', monospace;
  --font: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background-image: radial-gradient(ellipse at 20% 50%, rgba(0,229,160,0.04) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(61,127,255,0.04) 0%, transparent 60%);
}
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  font-size: 22px;
}
.logo h1 {
  font-family: var(--font-mono);
  color: var(--accent);
  font-size: 20px;
  letter-spacing: -0.5px;
}
.logo p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}
.tabs {
  display: flex;
  gap: 4px;
  background: var(--bg3);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 28px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 8px;
  text-align: center;
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  transition: all 0.15s;
  user-select: none;
}
.tab.active {
  background: var(--bg4);
  color: var(--accent);
}
.form-panel { display: none; }
.form-panel.active { display: block; }
.field {
  margin-bottom: 16px;
}
.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: border 0.15s;
}
.field input:focus {
  border-color: var(--accent2);
  box-shadow: 0 0 0 3px rgba(61,127,255,0.1);
}
.btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #0d0f14;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  font-family: var(--font);
  transition: background 0.15s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn:hover { background: #00ffb3; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: #0d0f14;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: none;
}
.btn.loading .spinner { display: block; }
.btn.loading .btn-text { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }
.msg {
  text-align: center;
  font-size: 12px;
  margin-top: 14px;
  min-height: 20px;
  padding: 8px 12px;
  border-radius: 6px;
  display: none;
}
.msg.error { color: var(--danger); background: rgba(255,61,90,0.08); border: 1px solid rgba(255,61,90,0.2); display: block; }
.msg.success { color: var(--accent); background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2); display: block; }
.forgot {
  text-align: right;
  margin-top: -8px;
  margin-bottom: 16px;
}
.forgot a {
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  cursor: pointer;
  transition: color 0.15s;
}
.forgot a:hover { color: var(--accent2); }
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 20px 0;
  color: var(--muted);
  font-size: 11px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.footer-note {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  margin-top: 20px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🖨️</div>
    <h1>Criattiva3D</h1>
    <p>Gestão de Impressão 3D</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Entrar</div>
    <div class="tab" onclick="switchTab('signup')">Criar conta</div>
  </div>

  <!-- LOGIN -->
  <div class="form-panel active" id="panel-login">
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="forgot"><a onclick="forgotPassword()">Esqueci minha senha</a></div>
    <button class="btn" id="btn-login" onclick="doLogin()">
      <div class="spinner"></div>
      <span class="btn-text">Entrar</span>
    </button>
    <div class="msg" id="msg-login"></div>
  </div>

  <!-- SIGNUP -->
  <div class="form-panel" id="panel-signup">
    <div class="field">
      <label>Nome completo</label>
      <input type="text" id="signup-name" placeholder="Seu nome" autocomplete="name" />
    </div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="signup-email" placeholder="seu@email.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="signup-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
    </div>
    <div class="field">
      <label>Confirmar senha</label>
      <input type="password" id="signup-pass2" placeholder="Repita a senha" autocomplete="new-password" />
    </div>
    <button class="btn" id="btn-signup" onclick="doSignup()">
      <div class="spinner"></div>
      <span class="btn-text">Criar conta</span>
    </button>
    <div class="msg" id="msg-signup"></div>
  </div>

  <div class="footer-note">Criattiva3D © 2025 · Todos os direitos reservados</div>
</div>

<script>
  // ── Supabase init ──────────────────────────────────────────────
  const SUPABASE_URL  = 'https://gvtqanrlazvurrfgrjfp.supabase.co';
  const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2dHFhbnJsYXp2dXJyZmdyamZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTExMTcsImV4cCI6MjA5MTY4NzExN30.PkRGx_rl58-Lsxyj4Sa1gr6T6Skfate2UYXzqOENxqQ';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── Verificar se já está logado ────────────────────────────────
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'app.html';
  })();

  // ── Helpers ────────────────────────────────────────────────────
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.classList.toggle('loading', loading);
  }
  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function clearMsg(id) {
    const el = document.getElementById(id);
    el.textContent = '';
    el.className = 'msg';
  }

  // ── Tab switch ────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
    });
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
    clearMsg('msg-login');
    clearMsg('msg-signup');
  }

  // ── Login ─────────────────────────────────────────────────────
  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { showMsg('msg-login', 'Preencha e-mail e senha.', 'error'); return; }
    setLoading('btn-login', true);
    clearMsg('msg-login');
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    setLoading('btn-login', false);
    if (error) {
      const msgs = {
        'Invalid login credentials': 'E-mail ou senha incorretos.',
        'Email not confirmed': 'Confirme seu e-mail antes de entrar.',
        'Too many requests': 'Muitas tentativas. Aguarde alguns minutos.',
      };
      showMsg('msg-login', msgs[error.message] || error.message, 'error');
    } else {
      showMsg('msg-login', '✓ Login realizado! Redirecionando...', 'success');
      setTimeout(() => window.location.href = 'app.html', 800);
    }
  }

  // ── Signup ────────────────────────────────────────────────────
  async function doSignup() {
    const name  = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pass  = document.getElementById('signup-pass').value;
    const pass2 = document.getElementById('signup-pass2').value;
    if (!name || !email || !pass || !pass2) { showMsg('msg-signup', 'Preencha todos os campos.', 'error'); return; }
    if (pass.length < 6) { showMsg('msg-signup', 'A senha deve ter pelo menos 6 caracteres.', 'error'); return; }
    if (pass !== pass2) { showMsg('msg-signup', 'As senhas não coincidem.', 'error'); return; }
    setLoading('btn-signup', true);
    clearMsg('msg-signup');
    const { error } = await sb.auth.signUp({
      email, password: pass,
      options: { data: { full_name: name } }
    });
    setLoading('btn-signup', false);
    if (error) {
      const msgs = {
        'User already registered': 'Este e-mail já está cadastrado.',
        'Password should be at least 6 characters': 'Senha deve ter mínimo 6 caracteres.',
      };
      showMsg('msg-signup', msgs[error.message] || error.message, 'error');
    } else {
      showMsg('msg-signup', '✓ Conta criada! Verifique seu e-mail para confirmar.', 'success');
    }
  }

  // ── Forgot password ───────────────────────────────────────────
  async function forgotPassword() {
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showMsg('msg-login', 'Digite seu e-mail acima primeiro.', 'error'); return; }
    setLoading('btn-login', true);
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/app.html'
    });
    setLoading('btn-login', false);
    if (error) {
      showMsg('msg-login', error.message, 'error');
    } else {
      showMsg('msg-login', '✓ Link de recuperação enviado para seu e-mail!', 'success');
    }
  }

  // ── Enter key ─────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const panel = document.querySelector('.form-panel.active').id;
      if (panel === 'panel-login') doLogin();
      else doSignup();
    }
  });
</script>
</body>
</html>
