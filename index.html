<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>3DPrint SaaS – Login</title>
  <!-- SDK do Supabase via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Cole aqui as variáveis CSS do seu app */
    :root { --bg:#0d0f14; --bg2:#13161e; --accent:#00e5a0; --text:#e8ecf4; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif;
           display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { background:var(--bg2); border:1px solid #2a3045; border-radius:16px;
            padding:40px; width:100%; max-width:420px; }
    .logo { text-align:center; margin-bottom:32px; }
    .logo h1 { font-family:'Space Mono',monospace; color:var(--accent); font-size:20px; }
    .tabs { display:flex; gap:4px; background:#1a1e29; border-radius:8px; padding:4px; margin-bottom:28px; }
    .tab { flex:1; padding:8px; text-align:center; border-radius:6px; cursor:pointer;
           font-size:13px; font-weight:600; color:#6b7592; transition:all .15s; }
    .tab.active { background:#21273a; color:var(--accent); }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:11px; font-weight:600; color:#6b7592;
                   text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
    .field input { width:100%; background:#1a1e29; border:1px solid #2a3045;
                   border-radius:8px; padding:10px 14px; color:var(--text);
                   font-size:13px; outline:none; }
    .field input:focus { border-color:var(--accent); }
    .btn { width:100%; padding:12px; background:var(--accent); color:#0d0f14;
           border:none; border-radius:8px; font-size:14px; font-weight:700;
           cursor:pointer; margin-top:8px; }
    .btn:hover { background:#00ffb3; }
    .msg { text-align:center; font-size:12px; margin-top:16px; min-height:20px; }
    .msg.error { color:#ff3d5a; }
    .msg.success { color:var(--accent); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo"><h1>// 3DPRINT</h1></div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('login')" id="tab-login">Entrar</div>
    <div class="tab" onclick="showTab('register')" id="tab-register">Criar conta</div>
  </div>

  <!-- LOGIN -->
  <div id="form-login">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="seu@email.com">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="••••••••">
    </div>
    <button class="btn" onclick="doLogin()">Entrar</button>
  </div>

  <!-- CADASTRO -->
  <div id="form-register" style="display:none">
    <div class="field">
      <label>Nome da empresa</label>
      <input type="text" id="reg-empresa" placeholder="Ex: Prints do João">
    </div>
    <div class="field">
      <label>Seu nome</label>
      <input type="text" id="reg-name" placeholder="João Silva">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="seu@email.com">
    </div>
    <div class="field">
      <label>Senha (mínimo 8 caracteres)</label>
      <input type="password" id="reg-pass" placeholder="••••••••">
    </div>
    <button class="btn" onclick="doRegister()">Criar conta grátis</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
  // ⚠️ Substitua pelos seus valores do Supabase
  const SUPABASE_URL = 'https://SEU_PROJETO.supabase.co';
  const SUPABASE_ANON = 'eyJ...';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Redirecionar se já está logado
  sb.auth.getSession().then(({ data }) => {
    if (data.session) location.href = 'app.html';
  });

  function showTab(tab) {
    document.getElementById('form-login').style.display = tab==='login' ? '' : 'none';
    document.getElementById('form-register').style.display = tab==='register' ? '' : 'none';
    document.getElementById('tab-login').className = 'tab'+(tab==='login'?' active':'');
    document.getElementById('tab-register').className = 'tab'+(tab==='register'?' active':'');
    setMsg('');
  }

  function setMsg(text, type='error') {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value;
    const pass  = document.getElementById('login-pass').value;
    setMsg('Entrando...', 'success');
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { setMsg(error.message); return; }
    location.href = 'app.html';
  }

  async function doRegister() {
    const empresa = document.getElementById('reg-empresa').value;
    const name    = document.getElementById('reg-name').value;
    const email   = document.getElementById('reg-email').value;
    const pass    = document.getElementById('reg-pass').value;
    setMsg('Criando conta...', 'success');
    const { error } = await sb.auth.signUp({
      email, password: pass,
      options: { data: { empresa, name } }
    });
    if (error) { setMsg(error.message); return; }
    setMsg('Conta criada! Redirecionando...', 'success');
    setTimeout(() => location.href = 'app.html', 1500);
  }
</script>
</body></html>
